name: Java Full-Stack Cloud CI/CD Pipeline

# Trigger this pipeline automatically every time a commit is pushed to the main branch
on:
  push:
    branches: [ main ]

jobs:
  # --- STAGE 1: Continuous Integration (Test & Verify) ---
  build-and-test:
    name: Compile & Run Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 25)
        uses: actions/setup-java@v4
        with:
          java-version: '25'          # Matches your project's precise compilation settings!
          distribution: 'temurin'
          cache: 'maven'

      - name: Execute Automated MockMVC Suite
        # This compiles your app and runs all 6 of your JUnit integration tests on GitHub's cloud servers
        run: mvn clean test

  # --- STAGE 2: Continuous Deployment (Trigger Live Cloud Update) ---
  deploy-to-production:
    name: Deploy Container to Render Cloud
    needs: build-and-test           # Strict Gate: This deployment will ONLY run if all 6 tests pass!
    runs-on: ubuntu-latest

    steps:
      - name: Fire Secure Webhook Ping
        # Tells Render's server infrastructure to safely pull, build the Dockerfile, and update the app
        run: |
          curl -X POST "https://api.render.com/deploy/srv-d8ihpvu47okc739dhut0?key=j39UbGu7Lsw"
